<html>
<head>
<title>ctrl.code</title>
<link rel="icon" type="image/x-icon" href="https://pluspng.com/img-png/ctrl-key-png--559.png">

<style>
body, html{
margin:0;
padding:0;
height:100%;
font-family:Georgia, serif;
background:white;
color:black;
}

.header{
text-align:center;
padding:10px;
}

.header h1{
font-size:50px;
margin:0;
}

.header nav p{
font-size:18px;
}

#downloadContainer{
text-align:center;
margin:10px;
}

#filenameInput{
padding:5px;
font-size:16px;
width:200px;
}

#downloadBtn{
padding:6px 20px;
font-size:16px;
cursor:pointer;
}

#aiBox{
text-align:center;
margin:10px;
}

#aiInput{
width:260px;
padding:6px;
font-size:14px;
}

.viewer{
display:flex;
height:calc(100% - 270px);
width:100%;
}

#editor{
width:50%;
height:100%;
border:1px solid #ccc;
padding:10px;
font-family:monospace;
font-size:14px;
background:white;
resize:none;
overflow:auto;
box-sizing:border-box;
}

#preview{
width:50%;
height:100%;
border:1px solid #ccc;
background:white;
}
</style>

</head>

<body>

<div class="header">
<h1 style="font-size:60px;">ctrl.code - Code</h1>
<hr>
<nav>
<p>
<a href="index.html">Homepage</a> |
<a href="credits.html">Credits</a>
</p>
</nav>
<hr>
</div>

<div id="downloadContainer">
<input type="text" id="filenameInput" placeholder="Enter filename" value="my_code">
<button id="downloadBtn">Download as HTML</button>
</div>

<div id="aiBox">
<h3>AI Coding Assistant</h3>
<input id="aiInput" placeholder="Try: make a navbar, login form, game">
<button onclick="askAI()">Generate</button>
</div>

<div class="viewer">

<textarea id="editor"><!DOCTYPE html>
<html>
<head>
<title>Example</title>
</head>
<body>
<h1>Hello World</h1>
<p>This should appear on the right.</p>
</body>
</html>
</textarea>

<iframe id="preview"></iframe>

</div>

<script>

const editor = document.getElementById("editor");
const preview = document.getElementById("preview");
const downloadBtn = document.getElementById("downloadBtn");
const filenameInput = document.getElementById("filenameInput");

function updatePreview(){
preview.srcdoc = editor.value;
}

editor.addEventListener("input", updatePreview);
updatePreview();

downloadBtn.addEventListener("click", () => {

let filename = filenameInput.value.trim();
if(filename === "") filename = "my_code";

const blob = new Blob([editor.value], {type:"text/html"});
const url = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = filename + ".html";

document.body.appendChild(a);
a.click();
document.body.removeChild(a);

URL.revokeObjectURL(url);

});

function insertIntoBody(codeSnippet){

let code = editor.value;

if(code.includes("</body>")){
editor.value = code.replace("</body>", codeSnippet + "\n</body>");
}else{
editor.value += "\n" + codeSnippet;
}

updatePreview();

}

function askAI(){

const q = document.getElementById("aiInput").value.toLowerCase();

if(q.includes("button") && q.includes("blue")){
insertIntoBody('<button style="background:blue;color:white;padding:10px;border:none;border-radius:5px;">Blue Button</button>');
}

else if(q.includes("button")){
insertIntoBody('<button>Click Me</button>');
}

else if(q.includes("navbar")){
insertIntoBody(`
<nav style="background:#eee;padding:10px;">
<a href="#">Home</a> |
<a href="#">About</a> |
<a href="#">Contact</a>
</nav>
`);
}

else if(q.includes("login")){
insertIntoBody(`
<form style="max-width:300px;">
<h3>Login</h3>
<input type="text" placeholder="Username"><br><br>
<input type="password" placeholder="Password"><br><br>
<button>Login</button>
</form>
`);
}

else if(q.includes("paragraph")){
insertIntoBody('<p>This is a paragraph.</p>');
}

else if(q.includes("image")){
insertIntoBody('<img src="https://via.placeholder.com/200">');
}

else if(q.includes("game")){
insertIntoBody(`
<h3>Click Game</h3>
<button onclick="score++ ; document.getElementById('score').innerText = score">Click Me</button>
<p>Score: <span id="score">0</span></p>
<script>
let score = 0;
<\/script>
`);
}

else{
insertIntoBody('<p>AI did not understand. Try: navbar, login form, game, button.</p>');
}

}

</script>

</body>
</html>
