<!DOCTYPE html>

<html>
<head>
<title>ctrl.code</title>
<link rel="icon" type="image/x-icon" href="https://pluspng.com/img-png/ctrl-key-png--559.png">

<style>
body, html{
margin:0;
padding:0;
height:100%;
font-family:Georgia, serif;
background:white;
color:black;
}

.header{
text-align:center;
padding:10px;
}

.header h1{
font-size:50px;
margin:0;
}

.header nav p{
font-size:18px;
}

#downloadContainer{
text-align:center;
margin:10px;
}

#filenameInput{
padding:6px;
font-size:16px;
width:200px;
}

#downloadBtn{
padding:6px 20px;
font-size:16px;
cursor:pointer;
}

#aiBox{
text-align:center;
margin:10px;
}

#aiInput{
width:280px;
padding:6px;
font-size:14px;
}

.viewer{
display:flex;
height:calc(100% - 270px);
width:100%;
}

#editor{
width:50%;
height:100%;
border:1px solid #ccc;
padding:10px;
font-family:monospace;
font-size:14px;
background:white;
resize:none;
overflow:auto;
box-sizing:border-box;
}

#preview{
width:50%;
height:100%;
border:1px solid #ccc;
background:white;
}
</style>

</head>

<body>

<div class="header">
<h1 style="font-size:60px;">ctrl.code - Code</h1>
<hr>
<nav>
<p>
<a href="index.html">Homepage</a> |
<a href="credits.html">Credits</a>
</p>
</nav>
<hr>
</div>

<div id="downloadContainer">
<input type="text" id="filenameInput" value="my_code">
<button id="downloadBtn">Download as HTML</button>
</div>

<div id="aiBox">
<h3>AI Coding Assistant</h3>
<input id="aiInput" placeholder="Try: navbar, login form, game, portfolio site">
<button onclick="askAI()">Generate</button>
</div>

<center>
<a href="ai-help.html">AI Commands</a>
</center>

<br>

<div class="viewer">

<textarea id="editor"><!DOCTYPE html>
<html>
<head>
<title>Example</title>
</head>
<body>

<h1>Hello World</h1>
<p>This should appear on the right.</p>

</body>
</html>
</textarea>

<iframe id="preview"></iframe>

</div>

<script>

const editor = document.getElementById("editor");
const preview = document.getElementById("preview");
const filenameInput = document.getElementById("filenameInput");

function updatePreview(){
preview.srcdoc = editor.value;
}

editor.addEventListener("input", updatePreview);
updatePreview();

/* DOWNLOAD */

document.getElementById("downloadBtn").onclick = function(){

let filename = filenameInput.value.trim();
if(filename==="") filename="my_code";

const blob = new Blob([editor.value],{type:"text/html"});
const url = URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download=filename+".html";

document.body.appendChild(a);
a.click();
document.body.removeChild(a);

URL.revokeObjectURL(url);
};

/* INSERT INTO BODY */

function insertIntoBody(code){

let page = editor.value;

if(page.includes("</body>")){
editor.value = page.replace("</body>", code+"\n</body>");
}
else{
editor.value += "\n"+code;
}

updatePreview();
}

/* AI ASSISTANT */

function askAI(){

const q=document.getElementById("aiInput").value.toLowerCase();

/* NAVBAR */

if(q.includes("navbar")){
insertIntoBody(`<nav style="background:#eee;padding:10px;">
<a href="#">Home</a> |
<a href="#">About</a> |
<a href="#">Projects</a> |
<a href="#">Contact</a>
</nav>`);
}

/* BUTTONS */

else if(q.includes("blue button")){
insertIntoBody('<button style="background:blue;color:white;padding:10px;border:none;border-radius:6px;">Blue Button</button>');
}

else if(q.includes("red button")){
insertIntoBody('<button style="background:red;color:white;padding:10px;border:none;">Red Button</button>');
}

else if(q.includes("green button")){
insertIntoBody('<button style="background:green;color:white;padding:10px;border:none;">Green Button</button>');
}

else if(q.includes("rounded button")){
insertIntoBody('<button style="padding:10px;border-radius:20px;">Rounded Button</button>');
}

else if(q.includes("big button")){
insertIntoBody('<button style="padding:20px;font-size:20px;">Big Button</button>');
}

/* FORMS */

else if(q.includes("login")){
insertIntoBody(`
<form style="max-width:300px;">
<h3>Login</h3>
<input type="text" placeholder="Username"><br><br>
<input type="password" placeholder="Password"><br><br>
<button>Login</button>
</form>
`);
}

else if(q.includes("signup")){
insertIntoBody(`
<form>
<h3>Sign Up</h3>
<input placeholder="Email"><br><br>
<input type="password" placeholder="Password"><br><br>
<button>Sign Up</button>
</form>
`);
}

else if(q.includes("input")){
insertIntoBody('<input placeholder="Type here">');
}

else if(q.includes("checkbox")){
insertIntoBody('<label><input type="checkbox"> Option</label>');
}

else if(q.includes("dropdown")){
insertIntoBody(`
<select>
<option>Option 1</option>
<option>Option 2</option>
<option>Option 3</option>
</select>
`);
}

/* TEXT */

else if(q.includes("heading")){
insertIntoBody("<h2>Heading</h2>");
}

else if(q.includes("paragraph")){
insertIntoBody("<p>This is a paragraph.</p>");
}

else if(q.includes("quote")){
insertIntoBody("<blockquote>This is a quote.</blockquote>");
}

else if(q.includes("list")){
insertIntoBody("<ul><li>Item 1</li><li>Item 2</li></ul>");
}

/* MEDIA */

else if(q.includes("image")){
insertIntoBody('<img src="https://via.placeholder.com/200">');
}

else if(q.includes("video")){
insertIntoBody('<video controls width="300"><source src="" type="video/mp4"></video>');
}

else if(q.includes("iframe")){
insertIntoBody('<iframe src="https://example.com" width="300" height="200"></iframe>');
}

else if(q.includes("gallery")){
insertIntoBody(`
<img src="https://via.placeholder.com/150">
<img src="https://via.placeholder.com/150">
<img src="https://via.placeholder.com/150">
`);
}

/* COMPONENTS */

else if(q.includes("card")){
insertIntoBody(`
<div style="border:1px solid #ccc;padding:20px;width:200px;">
<h3>Card</h3>
<p>Example card.</p>
</div>
`);
}

else if(q.includes("table")){
insertIntoBody(`
<table border="1">
<tr><th>Name</th><th>Age</th></tr>
<tr><td>Alice</td><td>20</td></tr>
<tr><td>Bob</td><td>25</td></tr>
</table>
`);
}

/* FIX CODE */

else if(q.includes("fix code")){

let code = editor.value;

if(!code.includes("<!DOCTYPE html>"))
code="<!DOCTYPE html>\n"+code;

if(!code.includes("<html>"))
code="<html>\n"+code;

if(!code.includes("</html>"))
code=code+"\n</html>";

if(!code.includes("<body>")){
code=code.replace("</head>","</head>\n<body>");
}

if(!code.includes("</body>")){
code=code+"\n</body>";
}

editor.value=code;

}

/* UNKNOWN */

else{
insertIntoBody("<p>AI did not understand. Try: navbar, login form, button, card, counter, game.</p>");
}

updatePreview();

}

</script>

</body>
</html>
