<!DOCTYPE html>

<html>
<head>
<title>ctrl.code</title>
<link rel="icon" type="image/x-icon" href="https://pluspng.com/img-png/ctrl-key-png--559.png">

<style>
body, html{
margin:0;
padding:0;
height:100%;
font-family:Georgia, serif;
background:white;
color:black;
}

.header{
text-align:center;
padding:10px;
}

.header h1{
font-size:50px;
margin:0;
}

.header nav p{
font-size:18px;
}

#downloadContainer{
text-align:center;
margin:10px;
}

#filenameInput{
padding:6px;
font-size:16px;
width:200px;
}

#downloadBtn{
padding:6px 20px;
font-size:16px;
cursor:pointer;
}

#aiBox{
text-align:center;
margin:10px;
}

#aiInput{
width:280px;
padding:6px;
font-size:14px;
}

.viewer{
display:flex;
height:calc(100% - 270px);
width:100%;
}

#editor{
width:50%;
height:100%;
border:1px solid #ccc;
padding:10px;
font-family:monospace;
font-size:14px;
background:white;
resize:none;
overflow:auto;
box-sizing:border-box;
}

#preview{
width:50%;
height:100%;
border:1px solid #ccc;
background:white;
}
</style>

</head>

<body>

<div class="header">
<h1 style="font-size:60px;">ctrl.code - Code</h1>
<hr>
<nav>
<p>
<a href="index.html">Homepage</a> |
<a href="credits.html">Credits</a>
</p>
</nav>
<hr>
</div>

<div id="downloadContainer">
<input type="text" id="filenameInput" value="my_code">
<button id="downloadBtn">Download as HTML</button>
</div>

<div id="aiBox">
<h3>AI Coding Assistant</h3>
<input id="aiInput" placeholder="Try: navbar, login form, game, portfolio site">
<button onclick="askAI()">Generate</button>
</div>

<div class="viewer">

<textarea id="editor"><!DOCTYPE html>
<html>
<head>
<title>Example</title>
</head>
<body>

<h1>Hello World</h1>
<p>This should appear on the right.</p>

</body>
</html>
</textarea>

<iframe id="preview"></iframe>

</div>

<script>

const editor = document.getElementById("editor");
const preview = document.getElementById("preview");
const filenameInput = document.getElementById("filenameInput");

function updatePreview(){
preview.srcdoc = editor.value;
}

editor.addEventListener("input", updatePreview);
updatePreview();

/* DOWNLOAD */

document.getElementById("downloadBtn").onclick = function(){

let filename = filenameInput.value.trim();
if(filename==="") filename="my_code";

const blob = new Blob([editor.value],{type:"text/html"});
const url = URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download=filename+".html";

document.body.appendChild(a);
a.click();
document.body.removeChild(a);

URL.revokeObjectURL(url);
};

/* INSERT CODE */

function insertIntoBody(code){

let page = editor.value;

if(page.includes("</body>")){
editor.value = page.replace("</body>", code+"\n</body>");
}
else{
editor.value += "\n"+code;
}

updatePreview();
}

/* AI ASSISTANT */

function askAI(){

const q=document.getElementById("aiInput").value.toLowerCase();

/* BUTTONS */

if(q.includes("blue button")){
insertIntoBody('<button style="background:blue;color:white;padding:10px;border:none;border-radius:6px;">Blue Button</button>');
}

/* NAVBAR */

else if(q.includes("navbar")){
insertIntoBody(`
<nav style="background:#eee;padding:10px;">
<a href="#">Home</a> |
<a href="#">About</a> |
<a href="#">Projects</a> |
<a href="#">Contact</a>
</nav>
`);
}

/* LOGIN FORM */

else if(q.includes("login")){
insertIntoBody(`
<form style="max-width:300px;">
<h3>Login</h3>
<input type="text" placeholder="Username"><br><br>
<input type="password" placeholder="Password"><br><br>
<button>Login</button>
</form>
`);
}

/* COUNTER APP */

else if(q.includes("counter")){
insertIntoBody(`
<h3>Counter</h3>
<button onclick="count++;document.getElementById('count').innerText=count;">Click</button>
<p>Count: <span id="count">0</span></p>
<script>
let count=0;
<\/script>
`);
}

/* CLICK GAME */

else if(q.includes("game")){
insertIntoBody(`
<h3>Click Game</h3>
<button onclick="score++;document.getElementById('score').innerText=score;">Click Me</button>
<p>Score: <span id="score">0</span></p>
<script>
let score=0;
<\/script>
`);
}

/* PORTFOLIO WEBSITE */

else if(q.includes("portfolio")){
editor.value = `<!DOCTYPE html>
<html>
<head>
<title>My Portfolio</title>
<style>
body{font-family:Arial;margin:0}
header{background:#333;color:white;padding:20px;text-align:center}
section{padding:20px}
</style>

</head>
<body>

<header>
<h1>My Portfolio</h1>
<p>Welcome to my website</p>
</header>

<section>
<h2>About Me</h2>
<p>I am a web developer.</p>
</section>

<section>
<h2>Projects</h2>
<p>Project coming soon.</p>
</section>

</body>
</html>`;
}

/* FIX HTML */

else if(q.includes("fix code")){
let code=editor.value;

if(!code.includes("<!DOCTYPE html>"))
code="<!DOCTYPE html>\n"+code;

if(!code.includes("<html>"))
code="<html>\n"+code+"\n</html>";

editor.value=code;
}

/* IMAGE */

else if(q.includes("image")){
insertIntoBody('<img src="https://via.placeholder.com/200">');
}

/* PARAGRAPH */

else if(q.includes("paragraph")){
insertIntoBody("<p>This is a paragraph.</p>");
}

/* UNKNOWN */

else{
insertIntoBody("<p>AI did not understand. Try: navbar, login form, counter, game, portfolio.</p>");
}

updatePreview();

}

</script>

</body>
</html>
