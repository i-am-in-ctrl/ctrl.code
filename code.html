<html>
<head>
<title>ctrl.code</title>
<link rel="icon" type="image/x-icon" href="https://pluspng.com/img-png/ctrl-key-png--559.png">

<style>
/* Reset & page styling */
body, html {
  margin:0;
  padding:0;
  height:100%;
  font-family: Georgia, serif;
  background:white;
  color:black;
}

/* Header */
.header {
  text-align: center;
  padding: 10px;
}

.header h1 {
  font-size:50px;
  margin:0;
}

.header nav p {
  font-size:18px;
}

/* Viewer container */
.viewer {
  display:flex;
  height:calc(100% - 210px); /* header + nav + input/button height */
  width:100%;
}

/* Editor */
#editor {
  width:50%;
  height:100%;
  border:1px solid #ccc;
  padding:10px;
  font-family: monospace;
  font-size:14px;
  color:black;
  background:white;
  resize:none;
  overflow:auto;
  box-sizing:border-box;
}

/* Preview */
#preview {
  width:50%;
  height:100%;
  border:1px solid #ccc;
  background:white;
}

/* Download section */
#downloadContainer {
  text-align:center;
  margin:10px 0;
}

#filenameInput {
  padding:5px;
  font-size:16px;
  width:200px;
}

#downloadBtn {
  padding:6px 20px;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<h1 style="font-size: 60px;">ctrl.code - Code</h1>
<hr>
<nav>
<p>
<a href="index.html">Homepage</a> |
<a href="credits.html">Credits</a>
</p>
</nav>
<hr>
</div>

<!-- Download section -->
<div id="downloadContainer">
  <input type="text" id="filenameInput" placeholder="Enter filename" value="my_code">
  <button id="downloadBtn">Download as HTML</button>
</div>

<div class="viewer">
<textarea id="editor">&lt;!DOCTYPE html&gt;
&lt;html&gt;
&lt;head&gt;
&lt;title&gt;Example&lt;/title&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;h1&gt;Hello World&lt;/h1&gt;
&lt;p&gt;This should appear on the right.&lt;/p&gt;
&lt;/body&gt;
&lt;/html&gt;
</textarea>

<iframe id="preview" srcdoc="&lt;!DOCTYPE html&gt;
&lt;html&gt;
&lt;head&gt;
&lt;title&gt;Example&lt;/title&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;h1&gt;Hello World&lt;/h1&gt;
&lt;p&gt;This should appear on the right.&lt;/p&gt;
&lt;/body&gt;
&lt;/html&gt;
"></iframe>
</div>

<script>
const editor = document.getElementById("editor");
const preview = document.getElementById("preview");
const downloadBtn = document.getElementById("downloadBtn");
const filenameInput = document.getElementById("filenameInput");

function updatePreview() {
  preview.srcdoc = editor.value;
}

editor.addEventListener("input", updatePreview);
updatePreview();

// Download as HTML with custom filename
downloadBtn.addEventListener("click", () => {
  let filename = filenameInput.value.trim();
  if(filename === "") filename = "my_code"; // fallback
  const blob = new Blob([editor.value], {type: "text/html"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename + ".html";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});
</script>

</body>
</html>
