<html>
<head>
<title>ctrl.code</title>
<link rel="icon" type="image/x-icon" href="https://pluspng.com/img-png/ctrl-key-png--559.png">

<style>
body, html{
margin:0;
padding:0;
height:100%;
font-family:Georgia, serif;
background:white;
color:black;
}

.header{
text-align:center;
padding:10px;
}

.header h1{
font-size:50px;
margin:0;
}

.header nav p{
font-size:18px;
}

#downloadContainer{
text-align:center;
margin:10px;
}

#filenameInput{
padding:5px;
font-size:16px;
width:200px;
}

#downloadBtn{
padding:6px 20px;
font-size:16px;
cursor:pointer;
}

#aiBox{
text-align:center;
margin:10px;
}

#aiInput{
width:250px;
padding:5px;
font-size:14px;
}

.viewer{
display:flex;
height:calc(100% - 260px);
width:100%;
}

#editor{
width:50%;
height:100%;
border:1px solid #ccc;
padding:10px;
font-family:monospace;
font-size:14px;
background:white;
resize:none;
overflow:auto;
box-sizing:border-box;
}

#preview{
width:50%;
height:100%;
border:1px solid #ccc;
background:white;
}
</style>
</head>

<body>

<div class="header">
<h1 style="font-size:60px;">ctrl.code - Code</h1>
<hr>
<nav>
<p>
<a href="index.html">Homepage</a> |
<a href="credits.html">Credits</a>
</p>
</nav>
<hr>
</div>

<div id="downloadContainer">
<input type="text" id="filenameInput" placeholder="Enter filename" value="my_code">
<button id="downloadBtn">Download as HTML</button>
</div>

<div id="aiBox">
<h3>AI Coding Assistant</h3>
<input id="aiInput" placeholder="Ask for code (example: make a button)">
<button onclick="askAI()">Generate</button>
</div>

<div class="viewer">

<textarea id="editor"><!DOCTYPE html>
<html>
<head>
<title>Example</title>
</head>
<body>
<h1>Hello World</h1>
<p>This should appear on the right.</p>
</body>
</html>
</textarea>

<iframe id="preview"></iframe>

</div>

<script>

const editor = document.getElementById("editor");
const preview = document.getElementById("preview");
const downloadBtn = document.getElementById("downloadBtn");
const filenameInput = document.getElementById("filenameInput");

function updatePreview(){
preview.srcdoc = editor.value;
}

editor.addEventListener("input", updatePreview);

updatePreview();

downloadBtn.addEventListener("click", () => {

let filename = filenameInput.value.trim();

if(filename === "") filename = "my_code";

const blob = new Blob([editor.value], {type:"text/html"});
const url = URL.createObjectURL(blob);

const a = document.createElement("a");

a.href = url;
a.download = filename + ".html";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

URL.revokeObjectURL(url);

});

function askAI(){

const question = document.getElementById("aiInput").value.toLowerCase();

let result = "";

if(question.includes("button")){
result = "<button>Click Me</button>";
}

else if(question.includes("image")){
result = '<img src="https://via.placeholder.com/150">';
}

else if(question.includes("paragraph")){
result = "<p>This is a paragraph.</p>";
}

else if(question.includes("heading")){
result = "<h1>Heading</h1>";
}

else if(question.includes("link")){
result = '<a href="#">Example Link</a>';
}

else{
result = "<p>I could not understand. Try asking for button, image, paragraph, heading, or link.</p>";
}

editor.value += "\n" + result;

updatePreview();

}

</script>

</body>
</html>
